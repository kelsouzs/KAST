# Read the Docs configuration file
# https://docs.readthedocs.io/en/stable/config-file/v2/

version: 2

build:
  os: ubuntu-20.04
  tools:
    python: "3.10"

python:
  version: 3.10
  install:
    - requirements: docs/requirements-docs.txt

# Sphinx
sphinx:
  configuration: docs/conf.py
  fail_on_warning: false

formats:
  - pdf
  - epub
